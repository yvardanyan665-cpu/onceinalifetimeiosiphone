name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py
        run: |
          # Ավելացրինք -L նշանը, որ վերահասցեավորումը ճիշտ կարդա
          curl -L --retry 5 --retry-delay 5 -o renpy.zip https://github.com/renpy/renpy/releases/download/8.3.3/renpy-8.3.3-sdk.zip
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Download Game Media
        run: |
          CONFIRM=$(curl -sc /tmp/cookies.txt "https://drive.google.com/uc?export=download&id=1hnBEc0crzs-DJUfBvKKPNiE5WNo-B1uY" | grep -o 'confirm=[^&]*' | head -n 1)
          curl -Lb /tmp/cookies.txt "https://drive.google.com/uc?export=download&${CONFIRM}&id=1hnBEc0crzs-DJUfBvKKPNiE5WNo-B1uY" -o game.zip
          unzip -q game.zip -d mygame
          
      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame --destination build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
