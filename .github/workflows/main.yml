name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Fix RenPy iOS Bug System-Wide
        run: |
          # 1. Վերականգնում ենք օրիգինալ ios.rpy ֆայլը՝ ջնջելով մեր բոլոր հին ուղղումները
          cd renpy-sdk
          git checkout launcher/game/ios.rpy 2>/dev/null || true
          rm -f launcher/game/ios.rpyc
          cd ..
          
          # 2. Գտնում ենք, թե որտեղ է Ren'Py-ի ներքին Python-ի site-packages պապկան
          PYTHON_SITE_PACKAGES=$(find renpy-sdk -type d -name "site-packages" | head -n 1)
          
          # 3. Պատճենում ենք renios մոդուլը ուղիղ համակարգային պապկայի մեջ
          if [ -d "renpy-sdk/launcher/game/renios" ] && [ -n "$PYTHON_SITE_PACKAGES" ]; then
            cp -R renpy-sdk/launcher/game/renios "$PYTHON_SITE_PACKAGES/"
            echo "RenPy iOS bug patched globally in system-wide python!"
          else
            echo "Error: Could not find renios or site-packages directory."
          fi

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
