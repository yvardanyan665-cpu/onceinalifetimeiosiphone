name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK & Dependencies
        run: |
          # 1. Քաշում ենք Ren'Py SDK-ն
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk
          
          # 2. Տեղադրում ենք Pillow նկարների հետ աշխատելու համար
          pip3 install Pillow

      - name: Bypass RenPy iOS Icon Bug
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Ջնջում ենք ios.rpy ֆայլի միջից այն տողը, որը կանչում է սխալ մոդուլը
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              lines = f.readlines()
          
          # Փոխարինում ենք սխալ տողը 'pass'-ով, որ ոչինչ չանի ու առաջ անցնի
          new_lines = []
          for line in lines:
              if 'renios.image.generate' in line or 'launcher.game.renios.image.generate' in line:
                  new_lines.append('    pass\n')
              else:
                  new_lines.append(line)
                  
          with open(file_path, 'wb') as f:
              f.write(''.join(new_lines).encode('utf-8'))
          print('RenPy icon generation function bypassed!')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
