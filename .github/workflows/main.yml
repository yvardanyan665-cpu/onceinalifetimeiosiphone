name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Debug and Package
        run: |
          # 1. Ցույց տուր, թե ինչ կա այս պապկայում
          ls -R
          
          # 2. Ստեղծում ենք IPA-ի կառուցվածքը
          mkdir -p output/Payload/Game.app
          
          # 3. Ուղղակի պատճենում ենք ամեն ինչ, եթե 'game' պապկա կա
          if [ -d "game" ]; then
            cp -R game/* output/Payload/Game.app/
          else
            # Եթե գլխավոր պապկայում 'game' չկա, պատճենում ենք այն, ինչ կա
            cp -R * output/Payload/Game.app/ 2>/dev/null || true
          fi
          
          # 4. Ստեղծում ենք Info.plist
          echo '{"CFBundleIdentifier": "com.game.renpy", "CFBundleExecutable": "Game"}' > output/Payload/Game.app/Info.plist
          
          # 5. Փաթեթավորում
          cd output
          zip -r ../game.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: game.ipa
