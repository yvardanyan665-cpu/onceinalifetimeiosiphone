name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py
        run: |
          curl -L -o renpy.zip https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Download Game Media
        run: |
          # Քաշում ենք խաղը քո Google Drive-ից
          curl -L -o game.zip "https://drive.google.com/uc?export=download&id=1hnBEc0crzs-DJUfBvKKPNiE5WNo-B1uY"
          unzip -q game.zip -d mygame
          
      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame --destination build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
