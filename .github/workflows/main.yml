name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Hard Patch RenPy iOS Bug
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Ուղղակիորեն փոխարինում ենք սխալ կանչը ճիշտ ներքին կանչով
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              content = f.read()
          
          # Փոխարինում ենք renios.image.generate-ը ուղիղ լոնչերի մեջ եղած մոդուլի հասցեով
          old_line = 'renios.image.generate(source, destination, scale)'
          new_line = 'launcher.game.renios.image.generate(source, destination, scale)'
          
          if old_line in content:
              content = content.replace(old_line, new_line)
              with open(file_path, 'wb') as f:
                  f.write(content.encode('utf-8'))
              print('RenPy iOS bug hot-fixed successfully!')
          else:
              print('Target line not found or already patched.')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
