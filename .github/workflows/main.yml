name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Bypass RenPy iOS Icon Bug cleanly
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Ուղղակիորեն չեզոքացնում ենք սխալ ֆունկցիան՝ սարքելով այն comment (#)
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              content = f.read()
          
          # Գտնում ենք սխալ ֆունկցիայի սկիզբը
          old_func = 'def ios_image(p, source, destination, scale, target):'
          
          # Սարքում ենք նոր մաքուր ֆունկցիա՝ 0 սփեյսով, իսկ հինը չեզոքացնում ենք
          new_func = 'def ios_image(p, source, destination, scale, target):\n    pass\n#def ios_image_hidden(p, source, destination, scale, target):'
          
          if old_func in content:
              content = content.replace(old_func, new_func)
              with open(file_path, 'wb') as f:
                  f.write(content.encode('utf-8'))
              print('RenPy icon function bypassed by redefining it cleanly!')
          else:
              print('Target function not found or already patched.')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
