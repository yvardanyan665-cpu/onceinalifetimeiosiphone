name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Fix RenPy iOS Bug Globally
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշերը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Ստեղծում ենք ուղղակի հղում (symlink) renios-ի համար Ren'Py-ի արմատական թղթապանակում
          ln -s launcher/game/renios renpy-sdk/renios
          
          # 3. Ուղղում ենք ios.rpy ֆայլը՝ ավելացնելով մաքուր ներմուծում հենց ֆայլի ամենասկզբում՝ առանց տեղաշարժերի (0 spaces)
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              content = f.read()
          
          # Եթե նախորդ փորձերից խառնվել է կոդը, բերում ենք օրիգինալ տեսքի
          if 'init -999' in content:
              content = content.split('sys.modules[\"renios\"] = renios\n\n')[1]
          if 'import importlib.util' in content:
              content = content.replace('    import gamedir; import importlib.util; spec = importlib.util.spec_from_file_location(\"renios\", gamedir.gamedir + \"/renios/__init__.py\"); renios = importlib.util.module_from_spec(spec); spec.loader.exec_module(renios); renios.image.generate(source, destination, scale)', 'renios.image.generate(source, destination, scale)')
          
          # Ավելացնում ենք ներմուծումը հենց ֆայլի սկզբում՝ 0 սփեյսով (գլոբալ մակարդակով)
          global_patch = 'python early:\n    import sys\n    import os\n    sys.path.insert(0, os.path.abspath(\"renpy-sdk/launcher/game\"))\n    import renios\n    sys.modules[\"renios\"] = renios\n\n'
          
          if 'python early:' not in content:
              with open(file_path, 'wb') as f:
                  f.write((global_patch + content).encode('utf-8'))
          print('Global python early patch applied cleanly!')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
