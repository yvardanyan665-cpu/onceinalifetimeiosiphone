name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install wget
          pip install gdown

      - name: Install Ren'Py
        run: |
          wget -t 10 --retry-connrefused --waitretry=5 https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip -O renpy.zip
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Download Game Media
        run: |
          gdown --id 1hnBEc0crzs-DJUfBvKKPNiE5WNo-B1uY -O game.zip
          unzip -q game.zip -d mygame
          
      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame --destination build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
