name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Precise Patch RenPy iOS Bug
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Հեռացնում ենք renios-ի սխալ տողը
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              lines = f.readlines()
          
          clean_lines = []
          for line in lines:
              if 'renios.image.generate' in line or 'launcher.game.renios' in line:
                  continue
              clean_lines.append(line)
          
          with open(file_path, 'wb') as f:
              f.write(''.join(clean_lines).encode('utf-8'))
          print('Precise patch applied!')
          "

      - name: Populate iOS Project
        run: |
          # Ավտոմատ գտնում ենք քո խաղի պապկայի անունը (որտեղ կա options.rpy կամ script.rpy)
          GAME_DIR=$(find . -maxdepth 3 -type d -name "game" ! -path "*renpy-sdk*" | head -n 1 | xargs dirname | xargs basename)
          if [ -z "$GAME_DIR" ] || [ "$GAME_DIR" = "." ]; then
            GAME_DIR=$(basename "$GITHUB_REPOSITORY")
          fi
          echo "Detected game directory name: $GAME_DIR"
          
          # Ստեղծում ենք iOS պրոյեկտը Ren'Py-ի սեփական build պապկայում
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate "$GAME_DIR" ./ios-build

      - name: Compile Xcode to IPA
        run: |
          # Գտնում ենք Xcode պրոյեկտը ios-build-ի ներսում
          XCODE_PROJ_DIR=$(find ios-build -type d -name "*.xcodeproj" | head -n 1 | xargs dirname)
          
          if [ -z "$XCODE_PROJ_DIR" ]; then
            echo "ERROR: Xcode project was not generated! Listing ios-build contents:"
            ls -R ios-build || true
            exit 1
          fi
          
          echo "Moving to Xcode project directory: $XCODE_PROJ_DIR"
          cd "$XCODE_PROJ_DIR"
          
          # Հավաքում ենք Xcode պրոյեկտը
          xcodebuild -project RenPyGame.xcodeproj -scheme RenPyGame -configuration Release -sdk iphoneos PACKAGE_TYPE=ipa CODE_SIGNING_ALLOWED=NO
          
          # Պատրաստում ենք վերջնական .ipa ֆայլը
          mkdir -p ../../output/Payload
          cp -R build/Release-iphoneos/*.app ../../output/Payload/ || cp -R build/UninstalledProducts/iphoneos/*.app ../../output/Payload/ || true
          
          cd ../../output
          zip -r ../game.ipa Payload
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: game.ipa
