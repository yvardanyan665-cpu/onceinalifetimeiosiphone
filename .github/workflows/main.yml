name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Ren'Py via PIP
        run: |
          pip install renpy
          
          ln -s $(python -c "import renpy; import os; print(os.path.dirname(renpy.__file__))") renpy-sdk

      - name: Download Game Media
        run: |
          CONFIRM=$(curl -sc /tmp/cookies.txt "https://drive.google.com/uc?export=download&id=1hnBEc0crzs-DJUfBvKKPNiE5WNo-B1uY" | grep -o 'confirm=[^&]*' | head -n 1)
          curl -Lb /tmp/cookies.txt "https://drive.google.com/uc?export=download&${CONFIRM}&id=1hnBEc0crzs-DJUfBvKKPNiE5WNo-B1uY" -o game.zip
          unzip -q game.zip -d mygame
          
      - name: Build iOS App
        run: |
          python -m renpy renpy-sdk/launcher ios_populate mygame
          python -m renpy renpy-sdk/launcher ios_build mygame --destination build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
