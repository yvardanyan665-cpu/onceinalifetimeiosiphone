name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Precise Patch RenPy iOS Bug
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Կարդում ենք օրիգինալ ֆայլը և հեռացնում միայն սխալ տողերը
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              lines = f.readlines()
          
          clean_lines = []
          for line in lines:
              # Եթե տողի մեջ կա renios-ի կանչը, այն ուղղակի բաց ենք թողնում (ջնջում ենք)
              if 'renios.image.generate' in line or 'launcher.game.renios' in line:
                  print('Removing broken line:', line.strip())
                  continue
              clean_lines.append(line)
          
          with open(file_path, 'wb') as f:
              f.write(''.join(clean_lines).encode('utf-8'))
          print('Precise patch applied. Original commands preserved!')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa          init python:
              def ios_populate(p, preview, destination):
                  pass
              def ios_image(p, source, destination, scale, target):
                  pass
