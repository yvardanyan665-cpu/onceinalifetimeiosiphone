name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Fix RenPy iOS Bug and Clear Cache
        run: |
          # 1. Մաքրում ենք հին կեշերը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Ֆայլի ամենաառաջին տողում ավելացնում ենք գլոբալ ներմուծում, որ ոչ մի սփեյսի սխալ չլինի
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          # Ավելացնում ենք մաքուր init python բլոկ հենց ֆայլի սկզբում՝ առանց տեղաշարժերի խնդրի
          patch = 'init -999 python:\n    import renios\n    import sys\n    sys.modules[\"renios\"] = renios\n\n'
          
          if 'init -999 python:' not in content:
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(patch + content)
          print('RenPy iOS global patch injected successfully!')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
