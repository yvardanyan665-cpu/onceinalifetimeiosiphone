name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies & Ren'Py SDK
        run: |
          # 1. Տեղադրում ենք անհրաժեշտ Python գրադարանը
          pip3 install future
          
          # 2. Քաշում և տեղադրում ենք Ren'Py-ը
          curl -O https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip
          unzip -q renpy-8.3.3-sdk.zip
          mv renpy-8.3.3-sdk renpy-sdk
          chmod +x renpy-sdk/renpy.py

      - name: Build Game (Headless Mode)
        run: |
          GAME_PATH=$(find . -type d -name "game" ! -path "*/renpy-sdk/*" | head -n 1)
          PROJECT_DIR=$(dirname "$GAME_PATH")
          
          # Օգտագործում ենք python3 և ավելացնում ենք մեր ընթացիկ պապկան PYTHONPATH-ի մեջ
          export PYTHONPATH=$PYTHONPATH:$(pwd)/renpy-sdk
          python3 renpy-sdk/renpy.py "$PROJECT_DIR" distribute --package ios --destination ./ios-build

      - name: Compile Xcode to IPA
        run: |
          XCODE_PROJ=$(find ios-build -name "*.xcodeproj" | head -n 1)
          if [ -z "$XCODE_PROJ" ]; then echo "Project not found"; exit 1; fi
          
          cd "$(dirname "$XCODE_PROJ")"
          xcodebuild -scheme RenPyGame -configuration Release -sdk iphoneos PACKAGE_TYPE=ipa CODE_SIGNING_ALLOWED=NO || true
          
          mkdir -p ../../output/Payload
          cp -R build/Release-iphoneos/*.app ../../output/Payload/ 2>/dev/null || true
          cd ../../output
          zip -r ../game.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: game.ipa
