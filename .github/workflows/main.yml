name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Force Bypass RenPy iOS Bug with Python
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Զրոյից, մաքուր Python-ով ստեղծում ենք նոր ios.rpy ֆայլը
          python3 -c "
          code = '''init python in ios:
              def ios_populate_command():
                  pass
              def ios_build_command():
                  pass
          
          init python:
              def ios_populate(p, preview, destination):
                  pass
              def ios_image(p, source, destination, scale, target):
                  pass
          '''
          with open('renpy-sdk/launcher/game/ios.rpy', 'w', encoding='utf-8') as f:
              f.write(code)
          print('RenPy iOS bug completely removed via clean Python file overwrite!')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
