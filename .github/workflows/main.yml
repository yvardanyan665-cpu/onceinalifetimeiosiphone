name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Fix RenPy iOS Bug and Clear Cache
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն ֆայլերը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Փոխում ենք կոդը այնպես, որ renios-ը ներբեռնվի անմիջապես ֆունկցիայի կատարման ժամանակ
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              content = f.read()
          
          # Եթե նախորդ փորձերից մնացել են մեր ավելացրած տողերը, ֆայլը բերում ենք նախնական տեսքի
          if 'init -999' in content:
              # Պարզապես վերականգնում ենք օրիգինալ կոդը՝ ջնջելով մեր հին patch-ը
              content = content.split('init -999 python:')[1].split('sys.modules[\"renios\"] = renios\n\n')[1]
          
          # Կատարում ենք անխոցելի փոխարինում. renios.image.generate-ի փոխարեն ասում ենք՝ թող ինքնուրույն գտնի մոդուլը
          old_line = 'renios.image.generate(source, destination, scale)'
          new_line = '    import gamedir; import importlib.util; spec = importlib.util.spec_from_file_location(\"renios\", gamedir.gamedir + \"/renios/__init__.py\"); renios = importlib.util.module_from_spec(spec); spec.loader.exec_module(renios); renios.image.generate(source, destination, scale)'
          
          if old_line in content:
              content = content.replace(old_line, new_line)
              with open(file_path, 'wb') as f:
                  f.write(content.encode('utf-8'))
              print('Advanced inline patch applied successfully!')
          else:
              print('Patch already applied or line not found.')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
