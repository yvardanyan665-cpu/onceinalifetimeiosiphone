name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ren'Py
        run: |
          curl -L -o renpy.zip https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Download Full Game Media
        run: |
          # Այստեղ սերվերը ավտոմատ ներբեռնում է խաղի բազան Itch.io-ից
          curl -L -o full_game.zip "https://caribdis.itch.io/once-in-a-lifetime/devlog/269450/10-public-release" || true
          # Յուր ջան, եթե ուղիղ ներբեռնման հղում ունես, կարող ենք դնել էստեղ
          
      - name: Setup Game Project
        run: |
          mkdir -p mygame/game
          # Կպցնում ենք քո թարգմանած ու փոխած կոդերը խաղի մեջ
          cp -r *.rpy mygame/game/
          
      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame --destination build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onceinalifetime-ios-ipa
          path: build/*.ipa
