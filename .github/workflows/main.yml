name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create Dummy iOS Structure
        run: |
          # Ստեղծում ենք մաքուր հիմք, առանց Ren'Py-ի հին կաղապարներին դիպչելու
          mkdir -p output/Payload/Game.app
          
          # Գտնում ենք 'game' պապկան
          GAME_PATH=$(find . -type d -name "game" ! -path "*/renpy-sdk/*" | head -n 1)
          
          # Պատճենում ենք ֆայլերը
          cp -R "$GAME_PATH" output/Payload/Game.app/
          
          # Ստեղծում ենք Info.plist, որ առանց դրա IPA-ն չի աշխատի
          echo '{"CFBundleIdentifier": "com.game.renpy", "CFBundleExecutable": "Game"}' > output/Payload/Game.app/Info.plist
          
          cd output
          zip -r ../game.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: game.ipa
