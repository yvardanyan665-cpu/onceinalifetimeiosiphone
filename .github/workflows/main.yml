name: Build Ren'Py iOS Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ren'Py SDK
        run: |
          # 1. Քաշում ենք միայն Ren'Py SDK-ն՝ առանց ավելորդ pip-երի
          python3 -c "
          import urllib.request
          import sys
          def progress(count, block_size, total_size):
              sys.stdout.write(f'\rDownloading RenPy: {int(count * block_size * 100 / total_size)}%')
              sys.stdout.flush()
          urllib.request.urlretrieve('https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.zip', 'renpy.zip', progress)
          "
          unzip -q renpy.zip
          mv renpy-8.3.3-sdk renpy-sdk

      - name: Bypass RenPy iOS Icon Bug
        run: |
          # 1. Մաքրում ենք հին կոմպիլյացիոն կեշը
          rm -f renpy-sdk/launcher/game/ios.rpyc
          
          # 2. Փոխարինում ենք սխալ կանչերը մաքուր 'pass'-ով, որ Ren'Py-ն անցնի առաջ
          python3 -c "
          file_path = 'renpy-sdk/launcher/game/ios.rpy'
          with open(file_path, 'r', encoding='utf-8-sig') as f:
              content = f.read()
          
          # Չեզոքացնում ենք սխալ տողի բոլոր հնարավոր տարբերակները
          content = content.replace('renios.image.generate(source, destination, scale)', '    pass')
          content = content.replace('launcher.game.renios.image.generate(source, destination, scale)', '    pass')
          
          with open(file_path, 'wb') as f:
              f.write(content.encode('utf-8'))
          print('RenPy icon generation successfully bypassed!')
          "

      - name: Build iOS App
        run: |
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_populate mygame build
          ./renpy-sdk/renpy.sh renpy-sdk/launcher ios_build mygame build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: build/*.ipa
